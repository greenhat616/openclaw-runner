services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw
    restart: unless-stopped
    hostname: openclaw

    ports:
      - "${OPENCLAW_PORT:-18789}:18789"

    environment:
      # ── OpenClaw ──
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      # ── AI Provider Keys ──
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # ── Shell ──
      - SHELL=/usr/bin/zsh
      - TERM=xterm-256color
      - LANG=en_US.UTF-8

    volumes:
      # ── User home (zsh history, tool caches, user-level global packages) ──
      - openclaw-home:/home/openclaw

      # ── OpenClaw config (openclaw.json, credentials, .env) ──
      - openclaw-config:/home/openclaw/.openclaw

      # ── OpenClaw workspace (skills, AGENTS.md, SOUL.md, etc.) ──
      - openclaw-workspace:/home/openclaw/.openclaw/workspace

      # ── Docker socket (optional: for container management skills) ──
      - /var/run/docker.sock:/var/run/docker.sock

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:18789/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  openclaw-home:
    driver: local
  openclaw-config:
    driver: local
  openclaw-workspace:
    driver: local
